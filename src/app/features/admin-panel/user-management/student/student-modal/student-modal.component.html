<p-dialog
  [(visible)]="visible"
  (onShow)="onDialogShown()"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="true"
  [dismissableMask]="true"
  [style]="{ width: 'min(1100px, 95vw)' }"
  [contentStyle]="{ 'max-height': '78vh', overflow: 'auto' }"
  (onHide)="close()"
>
  <ng-template pTemplate="header">
    <div class="w-full flex items-center justify-center">
      <div class="text-lg font-bold text-red-700">{{ dialogTitle }}</div>
    </div>
  </ng-template>

  <form #parentForm="ngForm" (ngSubmit)="onSave(parentForm)" class="p-4">

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

      <!-- LEFT COLUMN -->
      <div class="space-y-5">

        <!-- Full Name -->
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">
            <span class="text-red-600 mr-1">*</span> Full Name
          </label>
          <input
            pInputText
            class="w-full"
            name="full_name"
            [(ngModel)]="full_name"
            #fullNameCtrl="ngModel"
            required
            placeholder="Input full Name"
            [ngClass]="{ 'ng-invalid ng-dirty': fullNameCtrl.invalid && (fullNameCtrl.touched || submitted) }"
          />
          <p class="text-xs text-rose-600"
             *ngIf="fullNameCtrl.invalid && (fullNameCtrl.touched || submitted)">
             Full Name is required.
          </p>
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">
            <span class="text-red-600 mr-1">*</span> Email
          </label>
          <input
            pInputText
            class="w-full"
            name="email"
            [(ngModel)]="email"
            #emailCtrl="ngModel"
            required
            email
            placeholder="Input Email"
            [ngClass]="{ 'ng-invalid ng-dirty': emailCtrl.invalid && (emailCtrl.touched || submitted) }"
          />
          <p class="text-xs text-rose-600"
             *ngIf="emailCtrl.invalid && (emailCtrl.touched || submitted)">
             Email is required / must be valid.
          </p>
        </div>

        <!-- Mobile -->
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">
            <span class="text-red-600 mr-1">*</span> Mobile Number
          </label>
          <input
            pInputText
            class="w-full"
            name="mobile_number"
            [(ngModel)]="mobile_number"
            #mobileCtrl="ngModel"
            required
            pattern="^09[0-9]{9}$"
            maxlength="11"
            placeholder="Input Mobile"
            (keypress)="allowNumbersOnly($event)"
            (input)="mobile_number = mobile_number.replace(/[^0-9]/g, '')"
            [ngClass]="{ 'ng-invalid ng-dirty': mobileCtrl.invalid && (mobileCtrl.touched || submitted) }"
          />
        </div>

        <!-- Username -->
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">
            <span class="text-red-600 mr-1">*</span> Username
          </label>
          <input
            pInputText
            class="w-full"
            name="username"
            [(ngModel)]="username"
            #usernameCtrl="ngModel"
            required
            placeholder="Input Username"
            [ngClass]="{ 'ng-invalid ng-dirty': usernameCtrl.invalid && (usernameCtrl.touched || submitted) }"
          />
        </div>

      </div>

      <!-- RIGHT COLUMN -->
      <div class="space-y-5">

        <!-- Course -->
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">
            <span class="text-red-600 mr-1">*</span> Course
          </label>
          <input
            pInputText
            class="w-full"
            name="course"
            [(ngModel)]="course"
            #courseCtrl="ngModel"
            required
            placeholder="Input Course"
          />
        </div>

        <!-- Year -->
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">
            <span class="text-red-600 mr-1">*</span> Year Level
          </label>
          <input
            pInputText
            class="w-full"
            name="year_level"
            [(ngModel)]="year_level"
            #yearCtrl="ngModel"
            required
            placeholder="Input Year Level"
          />
        </div>

        <!-- Section -->
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">
            <span class="text-red-600 mr-1">*</span> Section
          </label>
          <input
            pInputText
            class="w-full"
            name="section"
            [(ngModel)]="section"
            #sectionCtrl="ngModel"
            required
            placeholder="Input Section"
          />
        </div>

      </div>

    </div>

    <!-- Image Upload -->
    <div class="mt-6">
      <label class="block text-sm font-semibold text-slate-700 mb-2">
        Profile Image (optional)
      </label>

      <div class="flex items-center gap-4">
        <div class="w-24 h-24 rounded-xl border bg-slate-50 flex items-center justify-center">
          <img *ngIf="previewUrl" [src]="previewUrl" class="w-full h-full object-cover"/>
          <span *ngIf="!previewUrl" class="text-xs text-slate-400">No image</span>
        </div>

        <div>
          <input
            #fileInput
            type="file"
            hidden
            accept="image/*"
            (change)="onFileSelected($event)"
          />

          <button
            type="button"
            pButton
            class="p-button-sm"
            label="Choose File"
            (click)="fileInput.click()"
          ></button>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="flex justify-end gap-3 mt-6">
      <button pButton type="button" label="Cancel" class="p-button-outlined" (click)="close()"></button>
      <button pButton type="submit" label="Add Record" class="p-button-success"></button>
    </div>

  </form>
</p-dialog>
