<p-dialog
  [(visible)]="visible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="false"
  [dismissableMask]="true"
  [style]="{
    width: 'min(980px, 95vw)',
  }"
  [contentStyle]="{
    padding: '0',
    overflow: 'hidden',
    'border-radius': '20px',
  }"
  styleClass="admin-view-dialog"
>
  <div class="flex flex-col max-h-[90vh]">
    <!-- Header -->
    <div
      class="flex items-center justify-between px-4 py-1.5 border-b border-slate-300 bg-white shrink-0"
    >
      <h2 class="text-lg font-extrabold leading-none text-[#7A0000] tracking-tight m-0">
        Admin Details
      </h2>

      <button
        type="button"
        (click)="close()"
        class="w-7 h-7 flex items-center justify-center rounded-full text-slate-600 hover:bg-slate-100 transition"
        aria-label="Close"
      >
        <i class="pi pi-times text-base"></i>
      </button>
    </div>

    <!-- Scrollable Content -->
    <div class="flex-1 overflow-y-auto bg-white px-6 pt-2 pb-20 space-y-4 min-h-0">
      <div class="space-y-4">
        <!-- Profile -->
        <div class="grid grid-cols-1 md:grid-cols-[180px_1fr] gap-2 md:gap-4 items-start">
          <div class="text-lg font-bold text-slate-700">Profile:</div>

          <div class="flex items-center gap-4">
            <img
              [src]="news.thumbnail"
              alt="Admin Profile"
              class="w-20 h-20 rounded-full object-cover border-2 border-slate-300 shadow-sm"
            />
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-[180px_1fr] gap-2 md:gap-4">
          <div class="text-lg font-bold text-slate-700">Title:</div>
          <div class="text-lg text-slate-700">{{ news.title || '—' }}</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-[180px_1fr] gap-2 md:gap-4">
          <div class="text-lg font-bold text-slate-700">Campaign:</div>
          <div class="text-lg text-slate-700">{{ news.campaign }}</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-[180px_1fr] gap-2 md:gap-4">
          <div class="text-lg font-bold text-slate-700">Date Published:</div>
          <div class="text-lg text-slate-700">{{ news.datePublished }}</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-[180px_1fr] gap-2 md:gap-4">
          <div class="text-lg font-bold text-slate-700">Authors:</div>
          <div class="text-lg text-slate-700">{{ news.authors }}</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-[180px_1fr] gap-2 md:gap-4">
          <div class="text-lg font-bold text-slate-700">News Type:</div>
          <div class="text-lg text-slate-700">{{ news.newsType }}</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-[180px_1fr] gap-2 md:gap-4">
          <div class="text-lg font-bold text-slate-700">Uploader Date:</div>
          <div class="text-lg text-slate-700">{{ news.uploaderDate }}</div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-[180px_1fr] gap-2 md:gap-4">
          <div class="text-lg font-bold text-slate-700">Uploader Name:</div>
          <div class="text-lg text-slate-700">{{ news.uploaderName }}</div>
        </div>

         <div class="h-10 shrink-0"></div>
      </div>
    </div>
  </div>
</p-dialog>
