<p-dialog
  [(visible)]="visible"
  (onShow)="onDialogShown()"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="true"
  [dismissableMask]="true"
  [style]="{ width: 'min(1100px, 95vw)' }"
  [contentStyle]="{ 'max-height': '78vh', overflow: 'auto' }"
  (onHide)="close()"
>
  <ng-template pTemplate="header">
    <div class="w-full flex items-center justify-center">
      <div class="text-lg font-bold text-red-700">{{ dialogTitle }}</div>
    </div>
  </ng-template>

  <form #parentForm="ngForm" (ngSubmit)="onSave(parentForm)" class="p-4">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

      <!-- LEFT -->
      <div class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">
            <span class="text-red-600 mr-1">*</span> Full Name:
          </label>
          <input
            pInputText class="w-full" name="full_name"
            [(ngModel)]="full_name"
            [disabled]="mode === 'VIEW'"
            #fullNameCtrl="ngModel"
            required
            placeholder="Input full Name"
            [ngClass]="{ 'ng-invalid ng-dirty': fullNameCtrl.invalid && (fullNameCtrl.touched || submitted) }"
          />
          <p class="mt-1 text-xs text-rose-600" *ngIf="fullNameCtrl.invalid && (fullNameCtrl.touched || submitted)">
            Full Name is required.
          </p>
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">
            <span class="text-red-600 mr-1">*</span> Email:
          </label>
          <input
            pInputText class="w-full" name="email"
            [(ngModel)]="email"
            [disabled]="mode === 'VIEW'"
            #emailCtrl="ngModel"
            required
            email
            placeholder="Input Email"
            [ngClass]="{ 'ng-invalid ng-dirty': emailCtrl.invalid && (emailCtrl.touched || submitted) }"
          />
          <p class="mt-1 text-xs text-rose-600" *ngIf="emailCtrl.invalid && (emailCtrl.touched || submitted)">
            Email is required / must be valid.
          </p>
        </div>

        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">
            <span class="text-red-600 mr-1">*</span> Mobile Number:
          </label>
          <input
            pInputText class="w-full" name="mobile_number"
            [(ngModel)]="mobile_number"
            #mobileCtrl="ngModel"
            required
            pattern="^09[0-9]{9}$"
            maxlength="11"
            inputmode="numeric"
            [disabled]="mode === 'VIEW'"
            placeholder="Input Mobile"
            (keypress)="allowNumbersOnly($event)"
            (input)="mobile_number = mobile_number.replace(/[^0-9]/g, '')"
            [ngClass]="{ 'ng-invalid ng-dirty': mobileCtrl.invalid && (mobileCtrl.touched || submitted) }"
          />
          <p class="mt-1 text-xs text-rose-600" *ngIf="mobileCtrl.invalid && (mobileCtrl.touched || submitted)">
            Mobile number is required.
          </p>
        </div>
      </div>

      <!-- RIGHT -->
      <div class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">
            <span class="text-red-600 mr-1">*</span> Username:
          </label>
          <input
            pInputText class="w-full" name="username"
            [(ngModel)]="username"
            [disabled]="mode === 'VIEW'"
            #usernameCtrl="ngModel"
            required
            placeholder="Input Username"
            [ngClass]="{ 'ng-invalid ng-dirty': usernameCtrl.invalid && (usernameCtrl.touched || submitted) }"
          />
          <p class="mt-1 text-xs text-rose-600" *ngIf="usernameCtrl.invalid && (usernameCtrl.touched || submitted)">
            Username is required.
          </p>
        </div>

         <div class="relative">
             <label class="block text-sm font-semibold text-slate-700 mb-2">
            <span class="text-red-600 mr-1">*</span> Password:
          </label>
           <input
             pInputText
             class="w-full pr-10"
             name="password"
             [(ngModel)]="password"
             [disabled]="mode === 'VIEW'"
             #passCtrl="ngModel"
             [type]="showPassword ? 'text' : 'password'"
             required
             placeholder="Input Password"
             [ngClass]="{ 'ng-invalid ng-dirty': passCtrl.invalid && (passCtrl.touched || submitted) }"
           />

           <i
           class="pi cursor-pointer absolute right-3 top-[38px] text-slate-500"
           [ngClass]="showPassword ? 'pi-eye-slash' : 'pi-eye'"
           (click)="togglePassword()"
        ></i>
     </div>

     <p class="mt-1 text-xs text-rose-600"
        *ngIf="passCtrl.invalid && (passCtrl.touched || submitted)">
        Password is required.
     </p>
   </div>

        <!-- ✅ Image Upload (PUP style: hidden input + custom label) -->
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">
            Profile Image (optional)
          </label>

          <div class="flex items-start gap-4">
            <div class="w-24 h-24 rounded-xl border border-slate-200 overflow-hidden bg-slate-50 flex items-center justify-center">
              <img *ngIf="previewUrl" [src]="previewUrl" class="w-full h-full object-cover" />
              <span *ngIf="!previewUrl" class="text-xs text-slate-400">No image</span>
            </div>

            <div class="flex-1 space-y-2">
              <input
                #fileInput
                type="file"
                hidden
                accept="image/*"
                (change)="onFileSelected($event)"
              />

              <div class="flex items-center gap-3">
                <span class="text-sm text-slate-600 cursor-pointer" (click)="fileInput.click()">
                  {{ fileName || 'Click to choose file' }}
                </span>

                <button type="button" pButton class="p-button-sm" label="Choose File" (click)="fileInput.click()"></button>

                <button
                  *ngIf="fileName || previewUrl"
                  type="button"
                  pButton
                  class="p-button-text p-button-sm"
                  label="Remove"
                  (click)="removeImage()"
                ></button>
              </div>
            </div>
          </div>
        </div>

      </div>



    <!-- Footer -->
    <div 
      *ngIf="mode !== 'VIEW'"
      class="flex justify-end gap-3 mt-6"
      >

      <button
         pButton
         type="button"
         label="Cancel"
         class="p-button-outlined"
         (click)="close()">
     </button>

     <button
        pButton
        type="submit"
        [label]="mode === 'ADD' ? 'Add Record' : 'Update Record'"
        class="p-button-success">
     </button>

    </div>
  </form>
</p-dialog>
