<p-dialog
  [(visible)]="visible"
  (onShow)="onDialogShown()"
  (onHide)="close()"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="true"
  [dismissableMask]="true"
  [style]="{ width: 'min(900px, 95vw)' }"
  [contentStyle]="{ 'max-height': '85vh', overflow: 'auto' }"
>
  <ng-template pTemplate="header">
    <div class="flex items-center justify-center w-full">
      <div class="text-lg font-bold text-blue-700">
        {{ dialogTitle }}
      </div>
    </div>
  </ng-template>

  <form #announcementForm="ngForm" (ngSubmit)="onSave(announcementForm)" class="p-4">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label class="block mb-2 text-sm font-semibold text-slate-700">
          <span class="text-red-600">*</span> Title
        </label>
        <input
          pInputText
          name="title"
          [(ngModel)]="title"
          [disabled]="isViewMode"
          class="w-full"
          required
          placeholder="Enter Title"
        />
      </div>

      <div>
        <label class="block mb-2 text-sm font-semibold text-slate-700">
          <span class="text-red-600">*</span> Priority
        </label>
        <p-select
          class="w-full"
          name="priority"
          [(ngModel)]="priority"
          [options]="priorityOptions"
          optionLabel="label"
          optionValue="value"
          [disabled]="isViewMode"
          placeholder="Select Priority"
          required
        ></p-select>
      </div>

      <div>
        <label class="block mb-2 text-sm font-semibold text-slate-700">
          <span class="text-red-600">*</span> Status
        </label>
        <p-select
          class="w-full"
          name="status"
          [(ngModel)]="status"
          [options]="statusOptions"
          optionLabel="label"
          optionValue="value"
          [disabled]="isViewMode"
          placeholder="Select Status"
          required
        ></p-select>
      </div>

      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">
          Attachment Image (optional)
        </label>

        <div class="flex items-start gap-4">
          <div
            class="w-24 h-24 rounded-xl border border-slate-200 overflow-hidden bg-slate-50 flex items-center justify-center"
          >
            <img *ngIf="previewUrl" [src]="previewUrl" class="w-full h-full object-cover" />
            <span *ngIf="!previewUrl" class="text-xs text-slate-400">No image</span>
          </div>

          <div class="flex-1 space-y-2">
            <input
              #attachmentInput
              type="file"
              hidden
              accept=".jpg,.jpeg,.png,.pdf,.doc,.docx"
              (change)="onAttachmentSelected($event)"
            />

            <div class="flex items-center gap-3 flex-wrap">
              <span
                class="text-sm text-slate-600 cursor-pointer break-all"
                *ngIf="!isViewMode"
                (click)="attachmentInput.click()"
              >
                {{ fileName || 'Click to choose image' }}
              </span>

              <span class="text-sm text-slate-600 break-all" *ngIf="isViewMode">
                {{ fileName || 'No image' }}
              </span>

              <button
                *ngIf="!isViewMode"
                type="button"
                pButton
                class="p-button-sm"
                label="Choose File"
                (click)="attachmentInput.click()"
              ></button>

              <button
                *ngIf="!isViewMode && (fileName || previewUrl)"
                type="button"
                pButton
                class="p-button-text p-button-sm"
                label="Remove"
                (click)="removeAttachment()"
              ></button>
            </div>
          </div>
        </div>
      </div>

      <div class="md:col-span-2">
        <label class="block mb-2 text-sm font-semibold text-slate-700">
          <span class="text-red-600">*</span> Description
        </label>
        <textarea
          pTextarea
          name="description"
          [(ngModel)]="description"
          [disabled]="isViewMode"
          class="w-full"
          rows="6"
          required
          placeholder="Enter Description"
        ></textarea>
      </div>
    </div>

    <div *ngIf="!isViewMode" class="flex justify-end gap-3 mt-6">
      <button
        pButton
        type="button"
        label="Cancel"
        class="p-button-outlined"
        (click)="close()"
      ></button>

      <button pButton type="submit" [label]="dialogButtonLabel" class="p-button-success"></button>
    </div>
  </form>
</p-dialog>
