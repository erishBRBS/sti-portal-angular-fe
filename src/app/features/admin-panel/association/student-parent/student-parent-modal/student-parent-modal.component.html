<p-dialog
  [(visible)]="visible"
  (onShow)="onDialogShown()"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="true"
  [dismissableMask]="true"
  [style]="{ width: 'min(500px, 95vw)' }"
  [contentStyle]="{ 'max-height': '78vh', overflow: 'auto' }"
  (onHide)="close()"
>
  <ng-template pTemplate="header">
    <div class="w-full flex items-center justify-center">
      <div class="text-lg font-bold text-red-700">{{ dialogTitle }}</div>
    </div>
  </ng-template>

  <form #studentParentForm="ngForm" (ngSubmit)="onSave(studentParentForm)" class="p-4">
    <div class="space-y-5">
      <!-- STUDENT -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">
          <span class="text-red-600 mr-1" *ngIf="mode !== 'VIEW'">*</span> Student:
        </label>

        <ng-container *ngIf="mode === 'VIEW'; else studentSelectTpl">
          <div class="w-full  px-3 py-2 text-sm text-slate-700">
            {{ student_name || '-' }}
          </div>
        </ng-container>

        <ng-template #studentSelectTpl>
          <select
            name="student_id"
            [(ngModel)]="student_id"
            #studentCtrl="ngModel"
            required
            class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500"
            [disabled]="loadingOptions"
            [ngClass]="{
              'ng-invalid ng-dirty': studentCtrl.invalid && (studentCtrl.touched || submitted)
            }"
          >
            <option [ngValue]="null">Select Student</option>
            <option *ngFor="let student of studentOptions" [ngValue]="student.value">
              {{ student.label }}
            </option>
          </select>

          <p
            class="mt-1 text-xs text-rose-600"
            *ngIf="studentCtrl.invalid && (studentCtrl.touched || submitted)"
          >
            Student is required.
          </p>
        </ng-template>
      </div>

      <!-- PARENT -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">
          <span class="text-red-600 mr-1" *ngIf="mode !== 'VIEW'">*</span> Parent:
        </label>

        <ng-container *ngIf="mode === 'VIEW'; else parentSelectTpl">
          <div class="w-full px-3 py-2 text-sm text-slate-700">
            {{ parent_name || '-' }}
          </div>
        </ng-container>

        <ng-template #parentSelectTpl>
          <select
            name="parent_id"
            [(ngModel)]="parent_id"
            #parentCtrl="ngModel"
            required
            class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500"
            [disabled]="loadingOptions"
            [ngClass]="{
              'ng-invalid ng-dirty': parentCtrl.invalid && (parentCtrl.touched || submitted)
            }"
          >
            <option [ngValue]="null">Select Parent</option>
            <option *ngFor="let parent of parentOptions" [ngValue]="parent.value">
              {{ parent.label }}
            </option>
          </select>

          <p
            class="mt-1 text-xs text-rose-600"
            *ngIf="parentCtrl.invalid && (parentCtrl.touched || submitted)"
          >
            Parent is required.
          </p>
        </ng-template>
      </div>
    </div>
  </form>
</p-dialog>
