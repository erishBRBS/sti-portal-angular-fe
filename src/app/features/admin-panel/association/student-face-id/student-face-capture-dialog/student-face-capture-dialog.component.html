<p-dialog
  [(visible)]="visible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="!uploading"
  [dismissableMask]="!uploading"
  [style]="{ width: '92vw', maxWidth: '1100px' }"
  [header]="dialogTitle"
  (onShow)="onDialogShow()"
  (onHide)="onDialogHide()"
>

<ng-template pTemplate="header">
    <div class="relative w-full flex items-center justify-center">
    
    <!-- TITLE -->
    <h2 class="text-lg font-semibold text-blue-700">
      {{ dialogTitle }}
    </h2>
  </div>
</ng-template>

  <div class="grid grid-cols-1 gap-6 lg:grid-cols-12">
    <!-- LEFT: CAMERA -->
    <div class="lg:col-span-7">
      <div class="overflow-hidden rounded-2xl border border-gray-200 bg-black shadow-sm">
        <div class="relative aspect-video w-full bg-black">
          <video
            #videoEl
            autoplay
            playsinline
            muted
            class="h-full w-full object-cover"
          ></video>

          <div class="absolute left-4 top-4 rounded-full bg-black/60 px-3 py-1 text-xs font-semibold text-white">
            {{ capturedPhotos.length }}/{{ requiredPhotoCount }} Captured
          </div>

          <div class="absolute bottom-4 left-1/2 -translate-x-1/2">
            <button
              pButton
              type="button"
              icon="pi pi-camera"
              label="Capture"
              class="p-button-rounded p-button-primary"
              [disabled]="!canCapture || uploading"
              (click)="capturePhoto()"
            ></button>
          </div>
        </div>
      </div>

      <canvas #canvasEl class="hidden"></canvas>

      <div class="mt-4 flex flex-wrap gap-3">
        <button
          pButton
          type="button"
          label="Restart Camera"
          icon="pi pi-refresh"
          class="p-button-outlined !border-slate-300 !text-slate-600 hover:!bg-slate-100"
          [disabled]="startingCamera || uploading"
          (click)="startCamera()"
        ></button>

        <button
          pButton
          type="button"
          label="Clear All"
          icon="pi pi-trash"
          class="p-button-outlined p-button-secondary"
          [disabled]="capturedPhotos.length === 0 || uploading"
          (click)="clearAllPhotos()"
        ></button>
      </div>

      <p
        *ngIf="cameraError"
        class="mt-3 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-600"
      >
        {{ cameraError }}
      </p>
    </div>

    <!-- RIGHT: FORM + PREVIEWS -->
    <div class="lg:col-span-5">
      <div class="rounded-2xl border border-gray-200 bg-white p-4 shadow-sm">
       <div *ngIf="mode === 'ADD'" class="space-y-3">

  <div class="flex gap-2">
    <input
      pInputText
      [(ngModel)]="studentNo"
      type="text"
      placeholder="Enter student number"
      class="w-full"
      [disabled]="uploading"
    />

    <button
      pButton
      type="button"
      icon="pi pi-search"
      label="Search"
      class="shrink-0 !bg-blue-600 !border-blue-600 hover:!bg-blue-700"
      [disabled]="uploading || !studentNo"
      (click)="searchStudent()"
    ></button>
  </div>

  <label class="text-sm font-semibold text-gray-700">Student Name</label>

  <input
    pInputText
    [(ngModel)]="studentName"
    class="w-full"
    disabled
  />

</div>

<!-- 🔵 EDIT MODE (DISPLAY ONLY) -->
<div *ngIf="mode === 'EDIT'" class="space-y-3">

  <div>
    <label class="text-xs text-gray-500">Student No</label>
    <div class="px-3 py-2 bg-gray-100 rounded-md text-gray-700">
      {{ studentNo }}
    </div>
  </div>

  <div>
    <label class="text-xs text-gray-500">Student Name</label>
    <div class="px-3 py-2 bg-gray-100 rounded-md text-gray-700">
      {{ studentName }}
    </div>
  </div>

</div>
        <div class="mt-5">
          <div class="mb-2 flex items-center justify-between">
            <h3 class="text-sm font-semibold text-gray-700">Captured Photos</h3>
            <span class="text-xs font-medium text-gray-500">
              Need exactly {{ requiredPhotoCount }} photos
            </span>
          </div>

          <div class="grid grid-cols-2 gap-3 sm:grid-cols-3">
            <div
              *ngFor="let item of capturedPhotos; let i = index"
              class="group relative overflow-hidden rounded-2xl border border-gray-200 bg-gray-50"
            >
              <img
                [src]="item.preview"
                alt="Captured photo"
                class="aspect-square h-full w-full object-cover"
              />

              <button
                type="button"
                class="absolute right-2 top-2 flex h-8 w-8 items-center justify-center rounded-full bg-black/70 text-white opacity-100 transition group-hover:scale-105"
                [disabled]="uploading"
                (click)="removePhoto(i)"
              >
                <i class="pi pi-times text-xs"></i>
              </button>

              <div class="absolute bottom-2 left-2 rounded-full bg-black/60 px-2 py-1 text-[11px] font-semibold text-white">
                Shot {{ i + 1 }}
              </div>
            </div>

            <div
              *ngFor="let _ of emptySlots"
              class="flex aspect-square items-center justify-center rounded-2xl border border-dashed border-gray-300 bg-gray-50 text-sm font-medium text-gray-400"
            >
              Empty
            </div>
          </div>
        </div>

        <div class="rounded-xl bg-slate-100 px-4 py-3 text-sm text-slate-600">
          Suggested capture:
          <span class="font-medium">
            front, slight left, slight right, slight up, slight down
          </span>
        </div>
      </div>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <div class="flex flex-col gap-3 sm:flex-row sm:justify-end">
      <button
        pButton
        type="button"
        label="Cancel"
       class="!bg-slate-100 !border-slate-300 !text-slate-700 hover:!bg-slate-200"
        [disabled]="uploading"
        (click)="closeDialog()"
      ></button>

      <button
        pButton
        type="button"
        icon="pi pi-upload"
        [label]="uploading ? 'Uploading...' : 'Upload 5 Photos'"
        [disabled]="!canUpload"
        (click)="save()"
        class="!bg-blue-600 !border-blue-600 !text-white hover:!bg-blue-700"
      ></button>
    </div>
  </ng-template>
</p-dialog>
