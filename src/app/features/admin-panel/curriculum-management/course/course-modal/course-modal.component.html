<p-dialog
  [(visible)]="visible"
  (onShow)="onDialogShown()"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="true"
  [dismissableMask]="true"
  [style]="{ width: 'min(500px, 95vw)' }"
  [contentStyle]="{ 'max-height': '78vh', overflow: 'auto' }"
  (onHide)="close()"
>
  <ng-template pTemplate="header">
    <div class="w-full flex items-center justify-center">
      <div class="text-lg font-bold text-red-700">{{ dialogTitle }}</div>
    </div>
  </ng-template>

  <form #courseForm="ngForm" (ngSubmit)="onSave(courseForm)" class="p-4">
    <div class="space-y-5">
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">
          <span class="text-red-600 mr-1">*</span> Course Name:
        </label>
        <input
          pInputText 
          class="w-full" 
          name="course_name"
          [(ngModel)]="course_name"
          [disabled]="mode === 'VIEW'"
          #courseNameCtrl="ngModel"
          required
          placeholder="Input Course Name"
          [ngClass]="{ 'ng-invalid ng-dirty': courseNameCtrl.invalid && (courseNameCtrl.touched || submitted) }"
        />
        <p class="mt-1 text-xs text-rose-600" *ngIf="courseNameCtrl.invalid && (courseNameCtrl.touched || submitted)">
          Course Name is required.
        </p>
      </div>
    </div>

    <!-- Footer -->
  <div
  *ngIf="mode !== 'VIEW'"
   class="flex justify-end gap-3 mt-6">

   <button
     pButton
     type="button"
     label="Cancel"
     class="p-button-outlined"
     (click)="close()">
  </button>

   <button
     pButton
    type="submit"
     [label]="mode === 'ADD' ? 'Add Record' : 'Update Record'"
     class="p-button-success">
  </button>

 </div>
  </form>
</p-dialog>
