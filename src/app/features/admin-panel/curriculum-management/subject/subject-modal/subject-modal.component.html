<p-dialog
  [(visible)]="visible"
  (onShow)="onDialogShown()"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="true"
  [dismissableMask]="true"
  [style]="{ width: 'min(500px, 95vw)' }"
  [contentStyle]="{ 'max-height': '78vh', overflow: 'auto' }"
  (onHide)="close()"
>
  <ng-template pTemplate="header">
    <div class="w-full flex items-center justify-center">
      <div class="text-lg font-bold text-red-700">{{ dialogTitle }}</div>
    </div>
  </ng-template>

  <form #subjectForm="ngForm" (ngSubmit)="onSave(subjectForm)" class="p-4">

    <div class="space-y-5">

      <!-- Subject Code -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">
          <span class="text-red-600 mr-1">*</span> Subject Code:
        </label>

        <input
          pInputText
          class="w-full"
          name="subject_code"
          [(ngModel)]="subject_code"
          [disabled]="mode === 'VIEW'"
          #subjectCodeCtrl="ngModel"
          required
          placeholder="Input Subject Code"
          [ngClass]="{
            'ng-invalid ng-dirty':
              subjectCodeCtrl.invalid &&
              (subjectCodeCtrl.touched || submitted)
          }"
        />

        <p
          class="mt-1 text-xs text-rose-600"
          *ngIf="subjectCodeCtrl.invalid && (subjectCodeCtrl.touched || submitted)"
        >
          Subject Code is required.
        </p>
      </div>


      <!-- Subject Name -->
      <div>
        <label class="block text-sm font-semibold text-slate-700 mb-2">
          <span class="text-red-600 mr-1">*</span> Subject Name:
        </label>

        <input
          pInputText
          class="w-full"
          name="subject_name"
          [(ngModel)]="subject_name"
           [disabled]="mode === 'VIEW'"
          #subjectNameCtrl="ngModel"
          required
          placeholder="Input Subject Name"
          [ngClass]="{
            'ng-invalid ng-dirty':
              subjectNameCtrl.invalid &&
              (subjectNameCtrl.touched || submitted)
          }"
        />

        <p
          class="mt-1 text-xs text-rose-600"
          *ngIf="subjectNameCtrl.invalid && (subjectNameCtrl.touched || submitted)"
        >
          Subject Name is required.
        </p>
      </div>

    </div>

    <!-- Footer -->
 <div
  *ngIf="mode !== 'VIEW'"
   class="flex justify-end gap-3 mt-6">

   <button
     pButton
     type="button"
     label="Cancel"
     class="p-button-outlined"
     (click)="close()">
  </button>

   <button
     pButton
    type="submit"
     [label]="mode === 'ADD' ? 'Add Record' : 'Update Record'"
     class="p-button-success">
  </button>

 </div>

  </form>
</p-dialog>
