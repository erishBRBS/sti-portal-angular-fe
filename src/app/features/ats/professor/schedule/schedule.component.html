<main class="mx-auto w-full space-y-8 animate-fadeIn">
  <div class="space-y-2 text-center md:text-left">
    <h2 class="text-xl font-black tracking-tighter text-blue-600 dark:text-blue-400">
      My Teaching Schedule
    </h2>
    <p class="text-slate-500 dark:text-slate-400 font-medium text-sm">
      Academic Year {{ academicYearLabel }}<span *ngIf="semesterLabel"> | {{ semesterLabel }}</span>
    </p>
  </div>

  <div class="flex px-4 sm:px-6 pb-6">
    <div class="w-full space-y-6">
      <section
        class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden"
      >
        <div class="p-6 border-b border-slate-200 dark:border-slate-800 flex items-center gap-2">
          <i class="pi pi-calendar text-blue-500"></i>
          <h3 class="text-lg font-bold text-slate-900 dark:text-white">Weekly Schedule</h3>
        </div>

        <div class="overflow-x-auto p-4">
          <div
            class="grid min-w-[1100px] rounded-2xl border border-slate-200 dark:border-slate-800 overflow-hidden"
            [style.gridTemplateColumns]="'120px repeat(6, minmax(0, 1fr))'"
            [style.gridTemplateRows]="'56px repeat(' + timeSlots.length + ', 44px)'"
          >
            <div
              class="bg-slate-50 dark:bg-slate-800 border-b border-r border-slate-200 dark:border-slate-800"
            ></div>

            <ng-container *ngFor="let day of days; let i = index">
              <div
                class="bg-slate-50 dark:bg-slate-800 border-b border-slate-200 dark:border-slate-800 flex items-center justify-center text-[11px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-wider"
                [style.gridColumn]="i + 2"
                [style.gridRow]="1"
              >
                {{ day }}
              </div>
            </ng-container>

            <ng-container *ngFor="let time of timeSlots; let i = index">
              <div
                class="border-r border-b border-slate-200 dark:border-slate-800 flex items-center justify-center text-[10px] font-bold"
                [ngClass]="
                  isHourLabel(time)
                    ? 'bg-slate-50/50 dark:bg-slate-900/50 text-blue-800 dark:text-blue-400'
                    : 'bg-slate-50/20 dark:bg-slate-900/30 text-slate-300 dark:text-slate-600'
                "
                [style.gridColumn]="1"
                [style.gridRow]="i + 2"
              >
                {{ isHourLabel(time) ? time : '' }}
              </div>
            </ng-container>

            <ng-container *ngFor="let time of timeSlots; let row = index">
              <ng-container *ngFor="let day of days; let col = index">
                <div
                  class="border-b border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900"
                  [style.gridColumn]="col + 2"
                  [style.gridRow]="row + 2"
                ></div>
              </ng-container>
            </ng-container>

            <ng-container *ngFor="let day of days">
              <div
                *ngFor="let classItem of getClassesForDay(day)"
                (click)="openDetails(classItem, $event)"
                class="z-10 m-1.5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-sm border-l-4 border-l-blue-600 dark:border-l-blue-500 rounded-xl p-3 hover:shadow-lg hover:-translate-y-0.5 hover:bg-blue-50 dark:hover:bg-blue-900/10 transition-all cursor-pointer overflow-hidden"
                [style.gridColumn]="getDayColumn(day)"
                [style.gridRow]="getRowStart(classItem) + ' / span ' + getRowSpan(classItem)"
              >
                <div class="text-[10px] font-black text-blue-600 dark:text-blue-400 mb-1 truncate">
                  {{ classItem.code }}
                </div>

                <div
                  class="text-xs font-bold text-slate-900 dark:text-slate-100 leading-tight mb-2"
                >
                  {{ classItem.name }}
                </div>

                <div
                  class="text-[10px] text-slate-500 dark:text-slate-400 flex items-center gap-1 font-semibold"
                >
                  <i class="pi pi-clock text-[9px]"></i>
                  {{ classItem.time }}
                </div>

                <div
                  class="text-[10px] text-slate-500 dark:text-slate-400 flex items-center gap-1 font-semibold mt-1"
                >
                  <i class="pi pi-map-marker text-[9px]"></i>
                  {{ classItem.room }}
                </div>

                <div class="text-[10px] text-slate-400 dark:text-slate-500 mt-2 truncate">
                  {{ classItem.section }}
                </div>
              </div>
            </ng-container>
          </div>
        </div>
      </section>
    </div>
  </div>
</main>
