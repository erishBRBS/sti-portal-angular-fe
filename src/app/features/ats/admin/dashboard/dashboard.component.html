<main class="mx-auto w-full space-y-8 animate-fadeIn">
  <!-- Header (spacing/layout natin) -->
  <div class="space-y-2 text-center md:text-left">
    <h2 class="text-xl font-black tracking-tighter text-blue-600 dark:text-blue-400">
      Admin Dashboard
    </h2>
    <p class="text-slate-500 dark:text-slate-400 font-medium text-sm">
      Monitor and manage system activities effectively
    </p>
  </div>

  <!-- Center container -->
  <div class="flex px-4 sm:px-6 pb-6">
    <div class="w-full space-y-6">
      <!-- Stats Cards (ONLY 3) -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <div
          *ngFor="let stat of stats"
          class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-2xl shadow-sm flex items-center gap-4 hover:translate-y-[-4px] transition-all duration-300 cursor-pointer"
          (click)="handleStatClick(stat)"
        >
          <div
            [ngClass]="{
              'bg-blue-50 text-blue-600 dark:bg-blue-900/20': stat.color === 'blue',
              'bg-yellow-50 text-yellow-600 dark:bg-yellow-900/20': stat.color === 'yellow',
              'bg-green-50 text-green-600 dark:bg-green-900/20': stat.color === 'green',
              'bg-purple-50 text-purple-600 dark:bg-purple-900/20': stat.color === 'purple',
              'bg-orange-50 text-orange-600 dark:bg-orange-900/20': stat.color === 'orange',
            }"
            class="w-14 h-14 rounded-2xl flex items-center justify-center text-2xl"
          >
            <i [class]="stat.icon"></i>
          </div>

          <div class="w-full">
            <p class="text-2xl font-bold text-slate-900 dark:text-white leading-none">
              {{ stat.value }}
            </p>
            <p class="text-sm text-slate-500 dark:text-slate-400 font-medium mt-1">
              {{ stat.label }}
            </p>

            <!-- Only show progress bar for Attendance Percentage -->
            <div class="mt-3" *ngIf="stat.label === 'Attendance Percentage'">
              <div class="w-full h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full overflow-hidden">
                <div
                  class="h-full bg-green-500 rounded-full"
                  [style.width]="attendancePercent + '%'"
                ></div>
              </div>
              <p class="text-[11px] text-slate-500 dark:text-slate-400 mt-2">
                {{ attendanceToday }}/{{ totalStudents }} present today
              </p>
            </div>
          </div>
        </div>
      </div>

      <!-- Quick Actions (ONLY 2) -->
      <section
        class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-2xl shadow-sm"
      >
        <h3 class="text-lg font-bold mb-4 text-slate-900 dark:text-white tracking-tight">
          Quick Actions
        </h3>

        <div class="grid grid-cols-2 md:grid-cols-2 gap-4">
          <button
            type="button"
            *ngFor="let action of quickActions"
            (click)="handleQuickAction(action)"
            class="flex flex-col items-center justify-center p-6 cursor-pointer rounded-2xl bg-slate-50 dark:bg-slate-800/50 text-slate-700 dark:text-slate-200 transition-all duration-300 group border border-slate-200 dark:border-slate-700 hover:border-blue-400 hover:text-blue-600 dark:hover:text-blue-400"
          >
            <i
              [class]="action.icon"
              class="text-2xl mb-2 group-hover:scale-110 transition-transform"
            ></i>
            <span class="text-sm font-semibold tracking-wide">{{ action.label }}</span>
          </button>
        </div>
      </section>

      <!-- Today's Activity (FACE RECOGNITION ONLY) -->
      <section
        class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm overflow-hidden"
      >
        <div class="p-6 border-b border-slate-200 dark:border-slate-800 flex items-center gap-2">
          <i class="pi pi-clock text-purple-500"></i>
          <h3 class="text-lg font-bold text-slate-900 dark:text-white">Today's Activity</h3>
        </div>

        <!-- gray divider only -->
        <div class="divide-y divide-slate-200 dark:divide-slate-800">
          <div
            *ngFor="let activity of activities"
            class="flex gap-4 p-4 hover:bg-slate-50 dark:hover:bg-slate-800/30 transition-colors"
          >
            <div
              class="w-10 h-10 rounded-xl bg-gradient-to-br from-purple-500 to-purple-600 flex items-center justify-center shadow-sm"
            >
              <i class="text-sm text-white" [ngClass]="activity.icon"></i>
            </div>

            <div class="flex-1">
              <div class="text-xs text-slate-500 dark:text-slate-400 mb-1 flex items-center gap-2">
                <i class="pi pi-clock text-slate-400"></i>
                {{ activity.time }}
              </div>
              <div class="text-sm text-slate-900 dark:text-slate-200 font-medium">
                {{ activity.text }}
              </div>
            </div>

            <!-- removed "New" -->
          </div>
        </div>
      </section>
    </div>
  </div>
</main>
