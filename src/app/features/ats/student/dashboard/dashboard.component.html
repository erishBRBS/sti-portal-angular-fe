<main class="mx-auto w-full space-y-8 animate-fadeIn">
  <!-- Header (spacing/layout natin) -->
  <div class="space-y-2 text-center md:text-left">
    <h2 class="text-xl font-black tracking-tighter text-blue-600 dark:text-blue-400">
      Student Dashboard
    </h2>
    <p class="text-slate-500 dark:text-slate-400 font-medium text-sm">
      Monitor your attendance and schedules
    </p>
  </div>

  <!-- Center container (spacing/layout natin) -->
  <div class="flex justify-center px-4 sm:px-6 pb-6">
    <div class="w-full space-y-6">
      <!-- Stats Cards -->
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
        <div
          *ngFor="let stat of stats"
          class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-2xl shadow-sm flex items-center gap-4 hover:translate-y-[-4px] transition-all duration-300"
        >
          <div
            class="w-14 h-14 rounded-2xl flex items-center justify-center text-2xl"
            [ngClass]="{
              'bg-blue-50 text-blue-600 dark:bg-blue-900/20 dark:text-blue-400':
                stat.color === 'blue',
              'bg-yellow-50 text-yellow-600 dark:bg-yellow-900/20 dark:text-yellow-400':
                stat.color === 'yellow',
              'bg-green-50 text-green-600 dark:bg-green-900/20 dark:text-green-400':
                stat.color === 'green',
            }"
          >
            <i [class]="stat.icon"></i>
          </div>

          <div>
            <p class="text-2xl font-bold text-slate-900 dark:text-white leading-none">
              {{ stat.value }}
            </p>
            <p class="text-sm text-slate-500 dark:text-slate-400 font-medium mt-1">
              {{ stat.label }}
            </p>
          </div>
        </div>
      </div>

      <!-- Quick Actions (3 only) -->
      <section
        class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-2xl shadow-sm"
      >
        <h3 class="text-lg font-bold mb-4 text-slate-900 dark:text-white tracking-tight">
          Quick Actions
        </h3>

        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
          <button
            type="button"
            *ngFor="let action of quickActions"
            (click)="handleQuickAction(action)"
            class="flex flex-col items-center justify-center p-6 rounded-2xl bg-slate-50 dark:bg-slate-800/50 text-slate-700 dark:text-slate-200 transition-all duration-300 group border border-slate-200 dark:border-slate-700 hover:border-blue-400 hover:text-blue-600 dark:hover:text-blue-400"
          >
            <i
              [class]="action.icon"
              class="text-2xl mb-2 group-hover:scale-110 transition-transform"
            ></i>
            <span class="text-sm font-semibold tracking-wide text-center">{{ action.label }}</span>
          </button>
        </div>
      </section>

      <!-- Today's Schedule -->
      <section
        class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm overflow-hidden"
      >
        <div
          class="p-6 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between"
        >
          <div class="flex items-center gap-2">
            <i class="pi pi-calendar text-blue-500"></i>
            <h3 class="text-lg font-bold text-slate-900 dark:text-white">Today's Schedule</h3>
          </div>
          <span class="text-xs font-medium text-slate-400">{{ todayDate }}</span>
        </div>

        <p-table [value]="classes" class="w-full" responsiveLayout="scroll">
          <ng-template pTemplate="header">
            <tr class="bg-slate-50 dark:bg-slate-800/50">
              <th class="p-4 text-left text-xs font-bold uppercase tracking-wider text-slate-500">
                Subject
              </th>
              <th class="p-4 text-left text-xs font-bold uppercase tracking-wider text-slate-500">
                Professor
              </th>
              <th class="p-4 text-left text-xs font-bold uppercase tracking-wider text-slate-500">
                Time
              </th>
              <th class="p-4 text-left text-xs font-bold uppercase tracking-wider text-slate-500">
                Status
              </th>
            </tr>
          </ng-template>
        </p-table>
      </section>
    </div>
  </div>
</main>
