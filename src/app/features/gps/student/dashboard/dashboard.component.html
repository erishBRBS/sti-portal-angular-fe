<div
  class="min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-300"
>
  <main class="mx-auto w-full space-y-8 animate-fadeIn">
    <div class="space-y-2 text-center md:text-left">
      <h2 class="text-xl font-black tracking-tighter text-blue-600 dark:text-blue-400">
        Student Dashboard
      </h2>
      <p class="text-slate-500 dark:text-slate-400 font-medium text-sm">
        Here's your academic summary for today
      </p>
    </div>

    <div class="flex px-4 sm:px-6 pb-6">
      <div class="w-full space-y-6">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-2 gap-6">
          <div
            *ngFor="let stat of stats"
            class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-2xl shadow-sm flex items-center gap-4 hover:translate-y-[-4px] transition-all duration-300"
          >
            <div
              [ngClass]="{
                'bg-blue-50 text-blue-600 dark:bg-blue-900/20 dark:text-blue-400':
                  stat.color === 'blue',
                'bg-yellow-50 text-yellow-600 dark:bg-yellow-900/20 dark:text-yellow-400':
                  stat.color === 'yellow'
              }"
              class="w-14 h-14 rounded-2xl flex items-center justify-center text-2xl"
            >
              <i [class]="stat.icon"></i>
            </div>

            <div class="w-full">
              <p class="text-2xl font-bold text-slate-900 dark:text-white leading-none">
                {{ loadingGrades ? 'Loading...' : stat.value }}
              </p>
              <p class="text-sm text-slate-500 dark:text-slate-400 font-medium mt-1">
                {{ stat.label }}
              </p>
            </div>
          </div>
        </div>

        <section
          class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-2xl shadow-sm"
        >
          <h3 class="text-lg font-bold mb-4 text-slate-900 dark:text-white tracking-tight">
            Quick Actions
          </h3>

          <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
            <button
              type="button"
              *ngFor="let action of quickActions"
              (click)="handleQuickAction(action)"
              class="flex flex-col items-center justify-center p-6 cursor-pointer rounded-2xl bg-slate-50 dark:bg-slate-800/50 text-slate-700 dark:text-slate-200 transition-all duration-300 group border border-slate-200 dark:border-slate-700 hover:border-blue-400 hover:text-blue-600 dark:hover:text-blue-400"
            >
              <i
                [class]="action.icon"
                class="text-2xl mb-2 group-hover:scale-110 transition-transform"
              ></i>
              <span class="text-sm font-semibold tracking-wide">{{ action.label }}</span>
            </button>
          </div>
        </section>

        <section
          class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm p-6"
        >
          <h3 class="text-lg font-bold text-slate-900 dark:text-white">Announcements</h3>
          <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Latest updates</p>

          <div class="mt-5 space-y-4">
            <div
              *ngFor="let a of announcements"
              class="p-4 rounded-2xl border border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-800/40"
            >
              <p class="font-semibold text-slate-900 dark:text-white">{{ a.title }}</p>
              <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">{{ a.date }}</p>
              <p class="text-sm text-slate-600 dark:text-slate-300 mt-2 line-clamp-2">
                {{ a.content }}
              </p>
            </div>
          </div>
        </section>
      </div>
    </div>
  </main>
</div>
