<main class="mx-auto w-full space-y-8 animate-fadeIn">
  <!-- Header (spacing/layout natin) -->
  <div class="space-y-2 text-center md:text-left">
    <h2 class="text-xl font-black tracking-tighter text-blue-600 dark:text-blue-400">
      Dashboard
    </h2>
    <p class="text-slate-500 dark:text-slate-400 font-medium text-sm">
      {{ todayDate }}
    </p>
  </div>

  <!-- Center container (spacing/layout natin) -->
  <div class="flex justify-center px-4 sm:px-6 pb-6">
    <div class="w-full space-y-6">
      <!-- Stats (ONLY 2 cards now) -->
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
        <div
          *ngFor="let stat of stats"
          class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800
                 p-6 rounded-2xl shadow-sm hover:shadow-md transition-all"
        >
          <div class="flex items-center justify-between">
            <div>
              <p class="text-slate-500 dark:text-slate-400 text-sm font-medium">
                {{ stat.label }}
              </p>
              <p class="text-3xl font-black text-slate-900 dark:text-white mt-2">
                {{ stat.value }}
              </p>
            </div>

            <div
              class="w-12 h-12 rounded-xl flex items-center justify-center"
              [ngClass]="[stat.bgColor, stat.darkBg]"
            >
              <i class="text-xl" [ngClass]="[stat.icon, stat.iconColor]"></i>
            </div>
          </div>
        </div>
      </div>

      <!-- Announcements ONLY -->
      <section
        class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800
               rounded-2xl shadow-sm overflow-hidden"
      >
        <div class="p-6 border-b border-slate-200 dark:border-slate-800">
          <h3 class="text-lg font-bold text-slate-900 dark:text-white tracking-tight">
            Announcements
          </h3>
          <p class="text-slate-500 dark:text-slate-400 font-medium text-sm mt-1">
            Latest updates
          </p>
        </div>

        <div class="p-6 space-y-4">
          <div
            *ngFor="let a of announcements"
            class="p-4 rounded-2xl border border-slate-200 dark:border-slate-800
                   bg-slate-50 dark:bg-slate-800/40"
          >
            <p class="font-semibold text-slate-900 dark:text-white">
              {{ a.title }}
            </p>
            <p class="text-xs text-slate-500 dark:text-slate-400 mt-1">
              {{ a.time }}
            </p>
            <p class="text-sm text-slate-600 dark:text-slate-300 mt-2 line-clamp-2">
              {{ a.content }}
            </p>
          </div>
        </div>
      </section>
    </div>
  </div>
</main>
