<main class="mx-auto w-full space-y-8 animate-fadeIn">
  <div class="space-y-2 text-center md:text-left">
    <h2 class="text-xl font-black tracking-tighter text-blue-600 dark:text-blue-400">
      Grade Management
    </h2>
    <p class="text-slate-500 dark:text-slate-400 font-medium text-sm">
      Manage and monitor your students' academic performance
    </p>
  </div>

  <div class="flex px-4 sm:px-6 pb-6">
    <div class="w-full space-y-6">
      <section
        class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-4 shadow-sm flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4"
      >
        <div class="min-w-0">
          <h3 class="font-bold text-slate-900 dark:text-white truncate">
            {{ selectedSubjectTitle }}
          </h3>
          <p class="text-xs text-slate-500 dark:text-slate-400 truncate">
            Select academic year and subject to view student grades
          </p>
        </div>

        <div class="w-full lg:w-auto">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 lg:gap-4">
            <div>
              <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-2">
                Academic Year
              </label>

              <p-select
                [options]="academicYearOptions"
                [(ngModel)]="selectedAcademicYear"
                (ngModelChange)="onAcademicYearChange($event)"
                optionLabel="label"
                optionValue="value"
                placeholder="Select academic year"
                appendTo="body"
                class="w-full sm:w-64"
              ></p-select>
            </div>

            <div>
              <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-2">
                Subject
              </label>

              <p-select
                [options]="subjectOptions"
                [(ngModel)]="selectedSubject"
                (ngModelChange)="onSubjectChange($event)"
                optionLabel="label"
                optionValue="id"
                placeholder="Select subject"
                appendTo="body"
                class="w-full sm:w-72"
              ></p-select>
            </div>
          </div>
        </div>
      </section>

      <sti-data-table
        [title]="'Class Grade Records'"
        [subtitle]="selectedSubjectTitle"
        [value]="filteredGrades"
        [columns]="gradeColumns"
        [loading]="false"
        [paginator]="true"
        [rows]="tableRows"
        [first]="tableFirst"
        [rowsPerPageOptions]="rowsPerPageOptions"
        (rowsChange)="tableRows = $event"
        (firstChange)="tableFirst = $event"
        [striped]="true"
        [rowHover]="true"
        [showActions]="true"
        [actions]="gradeActions"
        [showAdd]="false"
        [addLabel]="'Add Grade'"
        (actionClicked)="onTableAction($event)"
        (addClicked)="onAddGrade()"
      >
      </sti-data-table>
    </div>
  </div>
</main>
