<main class="mx-auto w-full space-y-8 animate-fadeIn">
  <div class="space-y-2 text-center md:text-left">
    <h2 class="text-xl font-black tracking-tighter text-blue-600 dark:text-blue-400">
      Grade Management
    </h2>
    <p class="text-slate-500 dark:text-slate-400 font-medium text-sm">
      Manage student grades by subject and section
    </p>
  </div>

  <div class="flex px-4 sm:px-6 pb-6">
    <div class="w-full space-y-6">
      <section
        class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm p-6"
      >
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">
              Subject
            </label>
            <select
              class="w-full rounded-xl border border-slate-300 dark:border-slate-700 px-4 py-2.5 text-sm bg-white dark:bg-slate-900 text-slate-900 dark:text-white"
              [value]="selectedSubject ?? ''"
              (change)="onSubjectChange($any($event.target).value)"
            >
              <option value="">All Subjects</option>
              <option *ngFor="let subject of subjectOptions" [value]="subject.id">
                {{ subject.label }}
              </option>
            </select>
          </div>

          <div>
            <label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2">
              Section
            </label>
            <select
              class="w-full rounded-xl border border-slate-300 dark:border-slate-700 px-4 py-2.5 text-sm bg-white dark:bg-slate-900 text-slate-900 dark:text-white"
              [value]="selectedSection ?? ''"
              (change)="onSectionChange($any($event.target).value)"
            >
              <option value="">All Sections</option>
              <option *ngFor="let section of sectionOptions" [value]="section.id">
                {{ section.label }}
              </option>
            </select>
          </div>

          <div class="flex items-end">
            <button
              type="button"
              (click)="clearFilters()"
              class="w-full rounded-xl border border-slate-300 dark:border-slate-700 px-4 py-2.5 text-sm font-semibold text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-800 transition"
            >
              Clear Filters
            </button>
          </div>
        </div>
      </section>

      <sti-data-table
        [title]="'Student Grades'"
        [subtitle]="'List of students and their grades'"
        [value]="filteredGrades"
        [columns]="gradeColumns"
        [actions]="gradeActions"
        [loading]="loading"
        [rows]="tableRows"
        [first]="tableFirst"
        [rowsPerPageOptions]="rowsPerPageOptions"
        [showActions]="true"
        [showAdd]="false"
        [showDelete]="false"
        [showImportCsv]="false"
        [showSelection]="false"
        (actionClicked)="onTableAction($event)"
      >
      </sti-data-table>
    </div>
  </div>
</main>
