<main class="mx-auto w-full space-y-8 animate-fadeIn">
  <!-- Header (layout/spacing natin) -->
  <div class="space-y-2 text-center md:text-left">
    <h2 class="text-xl font-black tracking-tighter text-blue-600 dark:text-blue-400">
      Child's Grades
    </h2>
    <p class="text-slate-500 dark:text-slate-400 font-medium text-sm">
      Monitor your child's academic performance
    </p>
  </div>

  <!-- Content wrapper -->
  <div class="flex px-4 sm:px-6 pb-6">
    <div class="w-full space-y-6">
      <section
        class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-4 shadow-sm flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4"
      >
        <div class="flex items-center gap-3 min-w-0">
          <div
            class="w-12 h-12 bg-gradient-to-br from-green-600 to-green-400 rounded-2xl flex items-center justify-center text-white font-bold text-lg shrink-0"
          >
            {{ getStudentInitials(selectedStudentName) }}
          </div>

          <div class="min-w-0">
            <h3 class="font-bold text-slate-900 dark:text-white truncate">
              {{ selectedStudentName }}
            </h3>
            <p class="text-xs text-slate-500 dark:text-slate-400 truncate">
              {{ selectedStudentDetails }}
            </p>
          </div>
        </div>

        <div class="w-full lg:w-auto">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 lg:gap-4">
            <div>
              <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-2">
                Student
              </label>

              <p-select
                [options]="studentOptions"
                [(ngModel)]="selectedStudent"
                (ngModelChange)="onStudentChange($event)"
                optionLabel="label"
                optionValue="value"
                placeholder="Select student"
                appendTo="body"
                class="w-full sm:w-64"
              ></p-select>
            </div>

            <div>
              <label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-2">
                Academic Year & Semester
              </label>

              <p-select
                [options]="termOptions"
                [(ngModel)]="selectedTerm"
                (ngModelChange)="onTermChange($event)"
                optionLabel="label"
                optionValue="value"
                placeholder="Select term"
                appendTo="body"
                class="w-full sm:w-64"
              ></p-select>
            </div>
          </div>
        </div>
      </section>

      <sti-data-table
        [title]="'Current Term Grades'"
        [subtitle]="selectedTerm"
        [value]="currentGrades"
        [columns]="currentGradeColumns"
        [loading]="false"
        [paginator]="false"
        [striped]="true"
        [rowHover]="true"
      >
      </sti-data-table>
    </div>
  </div>
</main>
