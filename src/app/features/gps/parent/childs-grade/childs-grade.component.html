<main class="mx-auto w-full space-y-8 animate-fadeIn">
  <div class="space-y-2 text-center md:text-left">
    <h2 class="text-xl font-black tracking-tighter text-blue-600 dark:text-blue-400">
      Child's Grades
    </h2>
    <p class="text-slate-500 dark:text-slate-400 font-medium text-sm">
      Monitor your child's academic performance
    </p>
  </div>

  <div class="flex px-4 sm:px-6 pb-6">
    <div class="w-full space-y-6">
      <section
        class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl px-6 py-6 shadow-sm"
      >
        <div
          class="flex flex-col xl:flex-row xl:items-center xl:justify-between gap-6"
        >
          <!-- Left student info -->
        <div class="flex items-center gap-3 min-w-0">
          <div class="min-w-0">
            <h3 class="font-bold text-slate-900 dark:text-white truncate">
              {{ selectedStudentName }}
            </h3>
            <p class="text-xs text-slate-500 dark:text-slate-400 truncate">
              {{ selectedStudentDetails }}
            </p>
          </div>
        </div>

          <!-- Right filters -->
          <div class="w-full xl:w-auto">
            <div
              class="grid grid-cols-1 md:grid-cols-3 gap-5 xl:gap-6 items-end"
            >
              <div class="w-full min-w-0">
                <label
                  class="block text-sm font-medium text-slate-500 dark:text-slate-400 mb-2"
                >
                  Child
                </label>

                <p-select
                  [options]="studentOptions"
                  [(ngModel)]="selectedStudent"
                  (ngModelChange)="onStudentChange($event)"
                  optionLabel="label"
                  optionValue="value"
                  placeholder="Select student"
                  appendTo="body"
                  class="w-full min-w-[260px]"
                ></p-select>
              </div>

              <div class="w-full min-w-0">
                <label
                  class="block text-sm font-medium text-slate-500 dark:text-slate-400 mb-2"
                >
                  Academic Year
                </label>

                <p-select
                  [options]="academicYearOptions"
                  [(ngModel)]="selectedAcademicYear"
                  (ngModelChange)="onAcademicYearChange($event)"
                  optionLabel="label"
                  optionValue="value"
                  placeholder="Select academic year"
                  appendTo="body"
                  class="w-full min-w-[220px]"
                ></p-select>
              </div>

              <div class="w-full min-w-0">
                <label
                  class="block text-sm font-medium text-slate-500 dark:text-slate-400 mb-2"
                >
                  Semester
                </label>

                <p-select
                  [options]="semesterOptions"
                  [(ngModel)]="selectedSemester"
                  (ngModelChange)="onSemesterChange($event)"
                  optionLabel="label"
                  optionValue="value"
                  placeholder="Select semester"
                  appendTo="body"
                  class="w-full min-w-[220px]"
                ></p-select>
              </div>
            </div>
          </div>
        </div>
      </section>

      <sti-data-table
        [title]="'Current Term Grades'"
        [subtitle]="selectedAcademicYear + ' • ' + selectedSemester"
        [value]="currentGrades"
        [columns]="currentGradeColumns"
        [loading]="loading"
        [paginator]="false"
        [striped]="true"
        [rowHover]="true"
      >
      </sti-data-table>
    </div>
  </div>
</main>
