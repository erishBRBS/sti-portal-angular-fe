<main class="mx-auto w-full space-y-8 animate-fadeIn">
  <div class="space-y-2 text-center md:text-left">
    <h2 class="text-xl font-black tracking-tighter text-blue-600 dark:text-blue-400">
      My Profile
    </h2>
    <p class="text-slate-500 dark:text-slate-400 font-medium text-sm">
      View and manage your profile information
    </p>
  </div>

  <div class="flex justify-center">
    <div class="w-full max-w-5xl space-y-6">
      <section
        class="bg-white dark:bg-slate-900 rounded-[2.5rem] border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden"
      >
        <div class="h-32 bg-blue-700 w-full relative">
          <div
            class="absolute inset-0 opacity-10 bg-[radial-gradient(circle_at_20%_50%,rgba(255,255,255,0.2),transparent)]"
          ></div>
        </div>

        <div class="px-8 pb-8">
          <div
            class="relative flex flex-col md:flex-row items-center md:items-end gap-6 -mt-16 mb-8"
          >
            <div class="w-32 h-32 bg-yellow-300 p-2 rounded-3xl shadow-xl">
              <div class="relative w-full h-full rounded-2xl overflow-hidden">
                <img
                  *ngIf="isUserReady"
                  [src]="currentAvatarUrl"
                  alt="Profile photo"
                  class="w-full h-full object-cover"
                />

                <label
                  *ngIf="isEditing"
                  class="absolute inset-x-0 bottom-0 px-3 py-2 cursor-pointer bg-black/55 text-white text-[10px] font-black uppercase tracking-widest flex items-center justify-center gap-2"
                >
                  <span>Change Photo</span>
                  <input
                    type="file"
                    accept="image/*"
                    class="hidden"
                    (change)="onPhotoSelected($event)"
                  />
                </label>
              </div>
            </div>

            <div class="text-center md:text-left flex-1 w-full">
              <div *ngIf="!isEditing; else editHeaderBlock">
                <h1
                  class="text-2xl font-black text-slate-800 dark:text-white uppercase tracking-tight"
                >
                  {{ user.name }}
                </h1>
              </div>

              <ng-template #editHeaderBlock>
                <div
                  *ngIf="user.role === 'student' || user.role === 'parent'; else singleNameEdit"
                  class="grid grid-cols-1 md:grid-cols-2 gap-3"
                >
                  <input
                    [(ngModel)]="editableFirstName"
                    placeholder="First name"
                    class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl text-base font-bold text-slate-800 dark:text-white px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                  />
                  <input
                    [(ngModel)]="editableLastName"
                    placeholder="Last name"
                    class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl text-base font-bold text-slate-800 dark:text-white px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                  />
                </div>

                <ng-template #singleNameEdit>
                  <input
                    [(ngModel)]="editableFullName"
                    class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl text-2xl font-black text-slate-800 dark:text-white uppercase tracking-tight px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500"
                  />
                </ng-template>
              </ng-template>
            </div>
          </div>

          <div
            class="grid grid-cols-1 md:grid-cols-2 gap-8 pt-8 border-t border-slate-200 dark:border-slate-800"
          >
            <div class="space-y-6">
              <div>
                <label
                  class="text-[10px] font-black text-slate-400 uppercase tracking-widest"
                >
                  Email Address
                </label>
                <p class="font-bold dark:text-white mt-1 lowercase">
                  {{ user.email || 'No email available' }}
                </p>
              </div>

              <div *ngIf="showStudentFields">
                <label
                  class="text-[10px] font-black text-slate-400 uppercase tracking-widest"
                >
                  Course
                </label>
                <p class="font-bold dark:text-white mt-1 uppercase">
                  {{ user.course || '-' }}
                </p>
              </div>
            </div>

            <div class="space-y-6">
              <div *ngIf="showStudentFields">
                <label
                  class="text-[10px] font-black text-slate-400 uppercase tracking-widest"
                >
                  Year Level
                </label>
                <p class="font-bold dark:text-white mt-1 uppercase">
                  {{ user.yearLevel || '-' }}
                </p>
              </div>

              <div *ngIf="showStudentFields">
                <label
                  class="text-[10px] font-black text-slate-400 uppercase tracking-widest"
                >
                  Section
                </label>
                <p class="font-bold dark:text-white mt-1 uppercase">
                  {{ user.section || '-' }}
                </p>
              </div>

              <div class="pt-2">
                <button
                  *ngIf="!isEditing"
                  type="button"
                  (click)="startEdit()"
                  class="w-full py-3 bg-slate-100 dark:bg-slate-800 text-slate-700 dark:text-white rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-blue-600 hover:text-white transition-all"
                >
                  Change Profile
                </button>

                <div *ngIf="isEditing" class="flex gap-2">
                  <button
                    type="button"
                    (click)="saveChanges()"
                    [disabled]="isSaving"
                    class="flex-1 py-3 bg-blue-600 text-white rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-blue-700 transition-all disabled:opacity-60"
                  >
                    {{ isSaving ? 'Saving...' : 'Save Changes' }}
                  </button>

                  <button
                    type="button"
                    (click)="cancelEdit()"
                    [disabled]="isSaving"
                    class="flex-1 py-3 bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-white rounded-2xl font-black text-[10px] uppercase tracking-widest hover:bg-slate-300 dark:hover:bg-slate-600 transition-all disabled:opacity-60"
                  >
                    Cancel
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>
</main>
